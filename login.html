<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartExam Portal - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Loading Screen Styles */
        #global-loader {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        
        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #2b5aed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loader-logo {
            font-size: 24px;
            font-weight: 800;
            color: #2b5aed;
            margin-top: 20px;
            letter-spacing: -0.5px;
        }
        
        .loader-text {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 8px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#1a4cd2] via-[#2b5aed] to-[#107a8b] min-h-screen flex items-center justify-center p-4">

    <!-- Global Loading Screen -->
    <div id="global-loader">
        <div class="loader-spinner"></div>
        <div class="loader-logo">SmartExam</div>
        <div class="loader-text">Loading secure portal...</div>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-[1.5rem] md:rounded-[2rem] shadow-2xl w-full max-w-[420px] p-6 sm:p-8 md:p-10 relative overflow-hidden transition-all duration-300 mx-2" id="auth-card">
        
        <!-- Header -->
        <div class="text-center mb-6 md:mb-8">
            <h1 class="text-xl md:text-2xl font-bold text-[#2b5aed] mb-1">SmartExam Portal</h1>
            <p class="text-[10px] md:text-xs text-gray-400 font-medium">Online Examination Evaluation System</p>
        </div>

        <!-- Tabs -->
        <div class="bg-[#f3f4f6] p-1 rounded-xl flex mb-8">
            <button id="tab-signin" onclick="switchTab('signin')" class="flex-1 bg-white text-[#2b5aed] font-semibold py-2.5 rounded-lg shadow-sm text-sm transition-all duration-200">Sign In</button>
            <button id="tab-signup" onclick="switchTab('signup')" class="flex-1 text-gray-500 font-medium py-2.5 rounded-lg text-sm hover:text-gray-700 transition-all duration-200">Create Account</button>
        </div>

        <!-- Sign In Form -->
        <form id="form-signin" onsubmit="handleSignin(event)" class="space-y-6 block">
            
            <!-- Email Field -->
            <div>
                <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Email / Username</label>
                <input type="text" id="signin-email" placeholder="you@example.com" required class="w-full px-4 py-3.5 rounded-xl border border-gray-200 focus:outline-none focus:border-[#2b5aed] focus:ring-1 focus:ring-[#2b5aed] transition text-gray-700 text-sm">
            </div>

            <!-- Password Field -->
            <div>
                <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="signin-password" placeholder="Enter your password" required class="w-full px-4 py-3.5 rounded-xl border border-gray-200 focus:outline-none focus:border-[#2b5aed] focus:ring-1 focus:ring-[#2b5aed] transition text-gray-700 text-sm tracking-[0.2em]">
                    <button type="button" onclick="togglePasswordVisibility('signin-password', this)" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 transition">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-[#1e4ed8] hover:bg-[#1e40af] text-white font-bold py-4 rounded-xl transition shadow-md mt-4 flex justify-center items-center space-x-2 text-sm">
                <span>Sign In &rarr;</span>
            </button>

            <!-- Footer Link -->
            <div class="text-center mt-8">
                <p class="text-xs text-gray-500 font-medium">
                    No account? <a href="#" onclick="switchTab('signup'); return false;" class="text-[#2b5aed] font-bold hover:underline">Create one free</a>
                </p>
            </div>
        </form>

        <!-- Sign Up Form (Hidden by default) -->
        <form id="form-signup" onsubmit="handleSignup(event)" class="space-y-5 hidden">
            
            <!-- Full Name Field -->
            <div>
                <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Full Name</label>
                <input type="text" id="signup-name" placeholder="e.g. John Doe" required class="w-full px-4 py-3.5 rounded-xl border border-gray-200 focus:outline-none focus:border-[#2b5aed] focus:ring-1 focus:ring-[#2b5aed] transition text-gray-700 text-sm">
            </div>

            <!-- Email Field -->
            <div>
                <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
                <input type="email" id="signup-email" placeholder="you@example.com" required class="w-full px-4 py-3.5 rounded-xl border border-gray-200 focus:outline-none focus:border-[#2b5aed] focus:ring-1 focus:ring-[#2b5aed] transition text-gray-700 text-sm">
            </div>

            <!-- Password Field -->
            <div>
                <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Create Password</label>
                <div class="relative">
                    <input type="password" id="signup-password" placeholder="Min 8 characters" required class="w-full px-4 py-3.5 rounded-xl border border-gray-200 focus:outline-none focus:border-[#2b5aed] focus:ring-1 focus:ring-[#2b5aed] transition text-gray-700 text-sm tracking-[0.2em]">
                    <button type="button" onclick="togglePasswordVisibility('signup-password', this)" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 transition">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-[#107a8b] hover:bg-[#0d6472] text-white font-bold py-4 rounded-xl transition shadow-md mt-4 flex justify-center items-center space-x-2 text-sm">
                <span>Create Account & Login &rarr;</span>
            </button>
            
            <!-- Footer Link -->
            <div class="text-center mt-6">
                <p class="text-xs text-gray-500 font-medium">
                    Already have an account? <a href="#" onclick="switchTab('signin'); return false;" class="text-[#2b5aed] font-bold hover:underline">Sign in</a>
                </p>
            </div>
        </form>

    </div>

    <!-- Interactive Scripts -->
    <script>
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const userEmail = localStorage.getItem('smartexam_useremail');
            const userRole = localStorage.getItem('smartexam_role');
            if (userEmail) {
                if (userRole === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
        });

        // Global Loader Initialization
        document.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('global-loader');
            if (loader) {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                setTimeout(() => loader.remove(), 500);
            }
        });

        function switchTab(tab) {
            const formSignin = document.getElementById('form-signin');
            const formSignup = document.getElementById('form-signup');
            const tabSignin = document.getElementById('tab-signin');
            const tabSignup = document.getElementById('tab-signup');

            // Style classes for active/inactive tabs
            const activeClasses = ['bg-white', 'text-[#2b5aed]', 'shadow-sm'];
            const inactiveClasses = ['text-gray-500', 'hover:text-gray-700', 'bg-transparent'];

            if (tab === 'signin') {
                // Show Sign In Form
                formSignin.classList.remove('hidden');
                formSignin.classList.add('block');
                formSignup.classList.remove('block');
                formSignup.classList.add('hidden');

                // Update Sign In Tab Style
                tabSignin.classList.add(...activeClasses);
                tabSignin.classList.remove(...inactiveClasses);
                
                // Update Sign Up Tab Style
                tabSignup.classList.remove(...activeClasses);
                tabSignup.classList.add(...inactiveClasses);
            } else {
                // Show Sign Up Form
                formSignup.classList.remove('hidden');
                formSignup.classList.add('block');
                formSignin.classList.remove('block');
                formSignin.classList.add('hidden');

                // Update Sign Up Tab Style
                tabSignup.classList.add(...activeClasses);
                tabSignup.classList.remove(...inactiveClasses);
                
                // Update Sign In Tab Style
                tabSignin.classList.remove(...activeClasses);
                tabSignin.classList.add(...inactiveClasses);
            }
        }

        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        async function handleSignup(event) {
            event.preventDefault();
            
            const btn = event.target.querySelector('button[type="submit"]');
            const nameInput = document.getElementById('signup-name').value.trim();
            const emailInput = document.getElementById('signup-email').value.trim();
            const passwordInput = document.getElementById('signup-password').value;
            
            // Show loading state
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Creating Account...';
            btn.classList.add('opacity-90', 'cursor-not-allowed');

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: nameInput, email: emailInput, password: passwordInput })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('smartexam_username', data.user.name.split(' ')[0]);
                    localStorage.setItem('smartexam_useremail', data.user.email);
                    localStorage.setItem('smartexam_role', data.user.role);

                    btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i> Success!';
                    btn.classList.replace('bg-[#107a8b]', 'bg-emerald-500');
                    btn.classList.replace('hover:bg-[#0d6472]', 'hover:bg-emerald-600');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                } else {
                    alert(data.message || 'Signup failed');
                    btn.innerHTML = 'Create Account & Login &rarr;';
                    btn.classList.remove('opacity-90', 'cursor-not-allowed');
                }
            } catch (error) {
                console.error('Signup error:', error);
                alert('Connection to server failed. Ensure the backend is running and MongoDB Atlas allows your IP.');
                btn.innerHTML = 'Create Account & Login &rarr;';
                btn.classList.remove('opacity-90', 'cursor-not-allowed');
            }
        }

        async function handleSignin(event) {
            event.preventDefault();
            
            const btn = event.target.querySelector('button[type="submit"]');
            const emailInput = document.getElementById('signin-email').value.trim();
            const passwordInput = document.getElementById('signin-password').value;
            
            // Show loading state
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Signing In...';
            btn.classList.add('opacity-90', 'cursor-not-allowed');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailInput, password: passwordInput })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('smartexam_role', data.user.role);
                    localStorage.setItem('smartexam_username', data.user.name.split(' ')[0]);
                    localStorage.setItem('smartexam_useremail', data.user.email);

                    if (data.user.role === 'admin') {
                        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Admin Login...';
                        setTimeout(() => {
                            window.location.href = 'admin.html';
                        }, 800);
                    } else {
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 800);
                    }
                } else {
                    alert(data.message || 'Invalid credentials');
                    btn.innerHTML = originalText;
                    btn.classList.remove('opacity-90', 'cursor-not-allowed');
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Connection to server failed. Ensure the backend is running and MongoDB Atlas allows your IP.');
                btn.innerHTML = originalText;
                btn.classList.remove('opacity-90', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
